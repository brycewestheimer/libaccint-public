# Codecov configuration for LibAccInt
# https://docs.codecov.io/docs/codecov-yaml

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 80%
        threshold: 2%
        if_not_found: success
    patch:
      default:
        target: 70%
        threshold: 5%
        if_not_found: success

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

ignore:
  - "tests/**/*"
  - "build/**/*"
  - "**/test_*.cpp"
  - "**/*_test.cpp"
  - "examples/**/*"
  - "codegen/**/*"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true
  require_base: false
  require_head: true

flags:
  unittests:
    paths:
      - src/
      - include/
    carryforward: true
  integration:
    paths:
      - src/
      - include/
    carryforward: true
