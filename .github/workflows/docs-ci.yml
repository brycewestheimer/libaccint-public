# Documentation CI - Build and deploy documentation for LibAccInt
name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'include/**'
      - '.github/workflows/docs-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'include/**'
      - '.github/workflows/docs-ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ==========================================================================
  # Build Documentation
  # ==========================================================================
  build:
    name: Build documentation
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz pandoc

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: docs-pip-${{ hashFiles('docs/requirements.txt') }}
          restore-keys: |
            docs-pip-

      - name: Install Python dependencies
        run: pip install -r docs/requirements.txt

      - name: Build Doxygen API docs
        run: |
          mkdir -p build/docs-ci build/docs/doxygen
          sed \
            -e "s|@CMAKE_CURRENT_BINARY_DIR@|$PWD/build/docs|g" \
            -e "s|@PROJECT_SOURCE_DIR@|$PWD|g" \
            -e "s|@DOXYGEN_WARN_AS_ERROR@|NO|g" \
            -e "s|@DOXYGEN_GENERATE_HTML@|NO|g" \
            -e "s|@DOXYGEN_HAVE_DOT@|YES|g" \
            docs/Doxyfile.in > build/docs-ci/Doxyfile
          doxygen build/docs-ci/Doxyfile

      - name: Build Sphinx documentation
        run: |
          cd docs
          sphinx-build -b html . _build/html

      - name: Check for broken links
        run: |
          cd docs
          make linkcheck || true
        continue-on-error: true

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs/_build/html/
          retention-days: 30

      - name: Setup Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html/

  # ==========================================================================
  # Deploy to GitHub Pages
  # ==========================================================================
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-22.04
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ==========================================================================
  # PR Preview Comment
  # ==========================================================================
  pr-preview:
    name: PR documentation preview
    runs-on: ubuntu-22.04
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: documentation
          path: docs-preview

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = `📚 **Documentation Preview**
            
            Documentation has been built successfully. You can download the built docs from the workflow artifacts.
            
            To preview locally:
            1. Download the "documentation" artifact from this workflow run
            2. Extract and open \`index.html\` in your browser`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
        continue-on-error: true
