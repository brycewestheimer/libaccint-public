# Python CI - Python bindings build and test workflow for LibAccInt
name: Python CI

on:
  push:
    branches: [main]
    paths:
      - 'python/**'
      - 'include/libaccint/**'
      - 'src/**'
      - 'CMakeLists.txt'
      - 'python/pyproject.toml'
      - '.github/workflows/python-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'python/**'
      - 'include/libaccint/**'
      - 'src/**'
      - 'CMakeLists.txt'
      - 'python/pyproject.toml'
      - '.github/workflows/python-ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Build and Test on Each Platform
  # ==========================================================================
  build-test:
    name: Python ${{ matrix.python-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-13, macos-14, windows-2022]
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libomp-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ninja libomp

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build pytest pytest-cov numpy

      - name: Build package
        run: python -m build
        working-directory: python

      - name: Install package
        run: |
          python -m pip install dist/*.whl
        working-directory: python

      - name: Test import
        run: |
          python -c "import libaccint; atoms=[libaccint.Atom(1,[0.0,0.0,0.0]), libaccint.Atom(1,[0.0,0.0,1.4])]; basis=libaccint.basis_set('sto-3g', atoms); engine=libaccint.Engine(basis); engine.compute_overlap_matrix(); print(f'libaccint version: {libaccint.__version__}')"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short
        working-directory: python

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: python/dist/*.whl
          retention-days: 7

  # ==========================================================================
  # Build Wheels with cibuildwheel
  # ==========================================================================
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-13, macos-14, windows-2022]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.16
        with:
          package-dir: python
          output-dir: wheelhouse
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux*"
          CIBW_BUILD_FRONTEND: "build"
          CIBW_BEFORE_BUILD_LINUX: "yum install -y ninja-build || apt-get install -y ninja-build || true"
          CIBW_BEFORE_BUILD_MACOS: "brew install ninja || true"
          CIBW_TEST_COMMAND: >-
            python -c "import libaccint; atoms=[libaccint.Atom(1,[0.0,0.0,0.0]), libaccint.Atom(1,[0.0,0.0,1.4])]; basis=libaccint.basis_set('sto-3g', atoms); engine=libaccint.Engine(basis); engine.compute_overlap_matrix(); print(libaccint.__version__)"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          retention-days: 30

  # ==========================================================================
  # Build Source Distribution
  # ==========================================================================
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: python -m pip install build

      - name: Build sdist
        run: python -m build --sdist
        working-directory: python

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: python/dist/*.tar.gz
          retention-days: 30

  # ==========================================================================
  # Type Checking
  # ==========================================================================
  type-check:
    name: Type checking
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install mypy
        run: python -m pip install mypy numpy

      - name: Run mypy
        run: |
          python -m mypy python/libaccint/ --ignore-missing-imports
        continue-on-error: true

  # ==========================================================================
  # Summary
  # ==========================================================================
  summary:
    name: Python CI Summary
    runs-on: ubuntu-22.04
    needs: [build-test]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.build-test.result }}" == "failure" ]]; then
            echo "::error::Python build/test failed"
            exit 1
          fi
          echo "Python CI jobs passed successfully!"
