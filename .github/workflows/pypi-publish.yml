# PyPI Publish - Publish Python package to PyPI/TestPyPI
name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: 'Target repository'
        type: choice
        options:
          - testpypi
          - pypi
        default: testpypi

concurrency:
  group: pypi-publish
  cancel-in-progress: false

jobs:
  # ==========================================================================
  # Build Wheels
  # ==========================================================================
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-13, macos-14, windows-2022]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.16
        with:
          package-dir: python
          output-dir: wheelhouse
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux*"
          CIBW_BUILD_FRONTEND: "build"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  # ==========================================================================
  # Build Source Distribution
  # ==========================================================================
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: python -m pip install build

      - name: Build sdist
        run: python -m build --sdist
        working-directory: python

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: python/dist/*.tar.gz

  # ==========================================================================
  # Publish to TestPyPI
  # ==========================================================================
  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-22.04
    needs: [build-wheels, build-sdist]
    if: github.event.inputs.target == 'testpypi' || (github.event_name == 'release' && github.event.release.prerelease)
    environment:
      name: testpypi
      url: https://test.pypi.org/project/libaccint
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List packages
        run: ls -la dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true

  # ==========================================================================
  # Publish to PyPI
  # ==========================================================================
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-22.04
    needs: [build-wheels, build-sdist]
    if: github.event.inputs.target == 'pypi' || (github.event_name == 'release' && !github.event.release.prerelease)
    environment:
      name: pypi
      url: https://pypi.org/project/libaccint
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List packages
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  # ==========================================================================
  # Verify Installation
  # ==========================================================================
  verify-install:
    name: Verify installation
    runs-on: ${{ matrix.os }}
    needs: [publish-testpypi, publish-pypi]
    if: always() && (needs.publish-testpypi.result == 'success' || needs.publish-pypi.result == 'success')
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-13, windows-2022]
        python-version: ['3.11']

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Wait for package availability
        run: sleep 60

      - name: Install from TestPyPI
        if: needs.publish-testpypi.result == 'success'
        run: |
          pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ libaccint
        continue-on-error: true

      - name: Install from PyPI
        if: needs.publish-pypi.result == 'success'
        run: pip install libaccint
        continue-on-error: true

      - name: Verify import
        run: python -c "import libaccint; print(f'Installed version: {libaccint.__version__}')"
        continue-on-error: true
